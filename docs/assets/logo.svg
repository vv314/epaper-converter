<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="560" height="160">
  <defs>
    <style>
      .bg { fill: #f8f9fa; }
      .cube-black { fill: #212529; stroke: #212529; stroke-width: 0.5; stroke-linejoin: miter; }
      .cube-white { fill: #ffffff; stroke: #ffffff; stroke-width: 0.5; stroke-linejoin: miter; }
      .cube-red { fill: #e03131; stroke: #e03131; stroke-width: 0.5; stroke-linejoin: miter; }
      .cube-yellow { fill: #fcc419; stroke: #fcc419; stroke-width: 0.5; stroke-linejoin: miter; }
      .cube-blue { fill: #1c7ed6; stroke: #1c7ed6; stroke-width: 0.5; stroke-linejoin: miter; }
      .cube-green { fill: #2f9e44; stroke: #2f9e44; stroke-width: 0.5; stroke-linejoin: miter; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-weight: 800; font-size: 32px; letter-spacing: -0.5px; fill: #212529; }
      .text-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 600; font-size: 10px; fill: #868e96; letter-spacing: 3px; text-transform: uppercase; }
      .subtitle-highlight { fill: #fcc419; }
      .subtitle-accent { fill: #1c7ed6; }
    </style>
  </defs>

  <!-- 图形部分：1x1 极简风格立体魔方 -->
  <g transform="translate(35, 38)">
    <!-- 顶面 (Top Face) - 红色 -->
    <path d="M 0 -22 L 20 -12 L 0 -2 L -20 -12 Z" class="cube-red" />
    
    <!-- 左侧面 (Left Face) - 蓝色 -->
    <path d="M -20 -12 L 0 -2 L 0 20 L -20 10 Z" class="cube-blue" />
    
    <!-- 右侧面 (Right Face) - 黄色 -->
    <path d="M 0 -2 L 20 -12 L 20 10 L 0 20 Z" class="cube-yellow" />
  </g>

  <!-- 文本部分 -->
  <text x="70" y="38" class="text-title">ePaper <tspan fill="#e03131">Conv</tspan></text>
  
  <g transform="translate(77, 56)">
    <text x="0" y="0" class="text-subtitle">
      <tspan class="subtitle-highlight">🦀</tspan>
      <tspan fill="#495057">QUANTIZE</tspan>
      <tspan class="subtitle-accent">🐚</tspan>
      <tspan fill="#495057">DITHER</tspan>
    </text>
  </g>

</svg>
